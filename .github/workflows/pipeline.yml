name: Config-Core CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Station 1: Standard Java Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Fix Maven Permissions
        run: chmod +x mvnw

      - name: Run Test Suite
        run: ./mvnw clean test

      - name: Package Artifact
        run: ./mvnw package -DskipTests

  # Station 2: Docker Verification (Build only, No Release)
  docker-verify:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 'push: false' means it builds the image to check for errors 
          # but DOES NOT try to send it to DockerHub.
          push: false 
          tags: config-core:test
