name: Config-Core CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Stage 1: Verify the code is high-quality and high-performance
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Fix Maven Permissions
        # This prevents the 'Permission Denied' Error 126
        run: chmod +x mvnw

      - name: Run Test Suite
        # Verifies Security (401s), Context Loading, and Virtual Threads
        run: ./mvnw clean test

      - name: Package Artifact
        run: ./mvnw package -DskipTests

  # Stage 2: Containerize and Release
  docker-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        # Ensure you have DOCKER_USERNAME and DOCKER_PASSWORD in GitHub Secrets
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push High-Performance Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/config-core:latest
