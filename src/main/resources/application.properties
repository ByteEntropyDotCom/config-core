spring.application.name=config-core

# Server Configuration
server.port=8888

# Application & Java 21 Virtual Threads
spring.threads.virtual.enabled=true

# Spring Cloud Config Server Settings
spring.cloud.config.server.git.uri=${GIT_CONFIG_REPO_URI:https://github.com/your-org/config-repo}
spring.cloud.config.server.git.search-paths={application}
spring.cloud.config.server.git.clone-on-start=true

# For private repos, uncomment and use environment variables:
# spring.cloud.config.server.git.username=${GIT_USERNAME}
# spring.cloud.config.server.git.password=${GIT_PASSWORD}

# Security Configuration
spring.security.user.name=${CONFIG_SERVICE_USER:admin}
spring.security.user.password=${CONFIG_SERVICE_PASS:admin123}

# Management & Actuator Endpoints
management.endpoints.web.exposure.include=health,info,refresh
management.endpoint.health.show-details=always