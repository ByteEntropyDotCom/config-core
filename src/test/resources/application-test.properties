# Force the 'native' profile so it searches the local classpath instead of Git
spring.profiles.active=native

# Core App Settings
spring.application.name=config-core-test
spring.threads.virtual.enabled=true

# Map the search location to the folder we will create
spring.cloud.config.server.native.search-locations=classpath:/test-config-repo

# Credentials for the TestRestTemplate to pass security
spring.security.user.name=admin
spring.security.user.password=admin123

# Expose health for the test check
management.endpoints.web.exposure.include=health